<!DOCTYPE html>
<html>
<head>
<title>mjkMarchingCubes Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117; color: #cdd9e5;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── toolbar ── */
  #toolbar {
    height: 44px; background: #161b22; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 14px; padding: 0 14px;
    flex-shrink: 0; flex-wrap: nowrap; overflow: hidden;
  }
  #toolbar h1 { font-size: 13px; color: #7fb3d3; white-space: nowrap; margin-right: 4px; }
  .ctrl { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .ctrl label { font-size: 11px; color: #8b949e; }
  .ctrl input[type=range] { width: 76px; accent-color: #58a6ff; }
  .ctrl .val { font-size: 11px; color: #58a6ff; min-width: 26px; }
  .sep { width: 1px; height: 24px; background: #30363d; flex-shrink: 0; }
  button {
    padding: 4px 10px; font-size: 11px; border-radius: 4px; cursor: pointer;
    border: 1px solid #30363d; background: #21262d; color: #cdd9e5;
    white-space: nowrap;
  }
  button:hover { background: #30363d; }
  button.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
  #build-msg { font-size: 10px; color: #3fb950; min-width: 80px; }

  /* ── main layout ── */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* 3D view */
  #view3d { flex: 1; position: relative; min-width: 0; }
  #view3d canvas { display: block; }
  #stats3d {
    position: absolute; bottom: 8px; left: 10px;
    font-size: 10px; color: #484f58; pointer-events: none;
  }

  /* editor panel */
  #panel {
    width: 508px; flex-shrink: 0;
    background: #161b22; border-left: 1px solid #30363d;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* palette */
  #palette-area {
    padding: 10px; border-bottom: 1px solid #30363d; flex-shrink: 0;
  }
  #palette-area h2 { font-size: 10px; color: #8b949e; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: 7px; }
  #palette { display: flex; flex-wrap: wrap; gap: 4px; }
  .tile-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 8px; border-radius: 4px; cursor: pointer;
    border: 1px solid #30363d; background: #21262d; color: #cdd9e5;
    font-size: 11px; user-select: none;
  }
  .tile-btn:hover { background: #2d333b; }
  .tile-btn.sel { border-color: #58a6ff; background: #162032; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.12); }

  /* map canvas area */
  #map-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #map-bar {
    padding: 7px 10px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  #map-bar h2 { font-size: 10px; color: #8b949e; text-transform: uppercase;
    letter-spacing: .06em; flex: 1; }
  #map-bar .ctrl label { color: #8b949e; }
  #hover-info { font-size: 10px; color: #58a6ff; min-width: 100px; text-align: right; }
  #canvas-wrap {
    flex: 1; overflow: auto; padding: 10px;
    display: flex; align-items: flex-start; justify-content: flex-start;
  }
  #map-canvas { cursor: crosshair; display: block; image-rendering: pixelated; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>mjkMarchingCubes Editor</h1>
  <div class="sep"></div>
  <div class="ctrl">
    <label>Ambient</label>
    <input type="range" id="sl-amb" min="0" max="30" value="12" step="1">
    <span class="val" id="v-amb">1.2</span>
  </div>
  <div class="ctrl">
    <label>Sun</label>
    <input type="range" id="sl-sun" min="0" max="30" value="15" step="1">
    <span class="val" id="v-sun">1.5</span>
  </div>
  <div class="sep"></div>
  <div class="ctrl">
    <label>pitDepth</label>
    <input type="range" id="sl-pit" min="1" max="10" value="4" step="1">
    <span class="val" id="v-pit">4</span>
  </div>
  <div class="sep"></div>
  <button id="btn-wire">Wireframe</button>
  <button id="btn-top">Top view</button>
  <button id="btn-cam">Reset cam</button>
  <button id="btn-export">Copy map</button>
  <div class="sep"></div>
  <span id="build-msg"></span>
</div>

<div id="main">
  <div id="view3d"><div id="stats3d"></div></div>

  <div id="panel">
    <div id="palette-area">
      <h2>Tile Palette — click to select, then paint on map</h2>
      <div id="palette"></div>
    </div>
    <div id="map-area">
      <div id="map-bar">
        <h2>Map 32×32 &nbsp;(left-drag paint · right-drag erase)</h2>
        <div class="ctrl">
          <label>Zoom</label>
          <input type="range" id="sl-zoom" min="8" max="24" value="15" step="1">
        </div>
        <span id="hover-info">&nbsp;</span>
      </div>
      <div id="canvas-wrap">
        <canvas id="map-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════════════════════
//  PARAMETERS
// ══════════════════════════════════════════════════════════════
const SIZE   = 32;
const AXMAX  = 78;
const AXMIN  = 0;
const AXRNG  = AXMAX - AXMIN;
const SIZE2  = SIZE * SIZE;
const TH     = 6;       // terrainHardness
const ISO    = 0;       // isolevel
let   PIT    = 4;       // pitDepth (editable)

// ══════════════════════════════════════════════════════════════
//  SCALAR FIELD
// ══════════════════════════════════════════════════════════════
function buildField() {
  const pts = new Array(SIZE * SIZE * SIZE);
  const val = new Float32Array(SIZE * SIZE * SIZE);

  for (let z = 0; z < SIZE; z++)
  for (let y = 0; y < SIZE; y++)
  for (let xi = 0; xi < SIZE; xi++) {
    const idx = xi + y * SIZE + z * SIZE2;
    pts[idx] = [
      AXMIN + AXRNG * xi / (SIZE - 1),
      AXMIN + AXRNG * y  / (SIZE - 1),
      AXMIN + AXRNG * z  / (SIZE - 1)
    ];
    const s = map[xi][z];
    let v = -TH * 5;
    if (s === 'x' && y < 4 + PIT)  v = TH;
    if (s === 'a' && y < 2 + PIT)  v = TH;
    if (s === 'b' && y < 3 + PIT)  v = TH;
    if (s === 'c' && y < 4 + PIT)  v = TH;
    if (y <= PIT)                   v = TH * 50;
    if (s==='A'||s==='B'||s==='C'||s==='w') v = -TH * 5;
    if (s === 'w' && y === PIT)     v = TH * 50;
    if (s === 'A' && y === 1 + PIT) v = TH;
    if (s === 'B' && y === 2 + PIT) v = TH;
    if (s === 'C' && y === 3 + PIT) v = TH;
    if (s === 'o' && y <= PIT)      v = -TH * 50;
    if (s === 'o' && y === 0)       v = TH * 10000;
    if ((s==='A'||s==='B'||s==='C'||s==='w') && y === 0) v = TH * 10000;
    val[idx] = v;
  }
  return { pts, val };
}

// ══════════════════════════════════════════════════════════════
//  MARCHING CUBES
// ══════════════════════════════════════════════════════════════
function marchingCubes(pts, val) {
  const out = [];
  const vl = new Array(12);
  function lerp(p1, p2, mu) {
    return [p1[0]+(p2[0]-p1[0])*mu, p1[1]+(p2[1]-p1[1])*mu, p1[2]+(p2[2]-p1[2])*mu];
  }
  for (let z=0; z<SIZE-1; z++)
  for (let y=0; y<SIZE-1; y++)
  for (let xi=0; xi<SIZE-1; xi++) {
    const p=xi+y*SIZE+z*SIZE2, px=p+1, py=p+SIZE, pxy=py+1;
    const pz=p+SIZE2, pxz=px+SIZE2, pyz=py+SIZE2, pxyz=pxy+SIZE2;
    const v0=val[p],v1=val[px],v2=val[py],v3=val[pxy];
    const v4=val[pz],v5=val[pxz],v6=val[pyz],v7=val[pxyz];
    let ci=0;
    if(v0<ISO)ci|=1; if(v1<ISO)ci|=2;  if(v2<ISO)ci|=8;  if(v3<ISO)ci|=4;
    if(v4<ISO)ci|=16;if(v5<ISO)ci|=32; if(v6<ISO)ci|=128;if(v7<ISO)ci|=64;
    const bits=ET[ci]; if(!bits)continue;
    if(bits&1)   {const m=(ISO-v0)/(v1-v0);vl[0] =lerp(pts[p],  pts[px],  m);}
    if(bits&2)   {const m=(ISO-v1)/(v3-v1);vl[1] =lerp(pts[px], pts[pxy], m);}
    if(bits&4)   {const m=(ISO-v2)/(v3-v2);vl[2] =lerp(pts[py], pts[pxy], m);}
    if(bits&8)   {const m=(ISO-v0)/(v2-v0);vl[3] =lerp(pts[p],  pts[py],  m);}
    if(bits&16)  {const m=(ISO-v4)/(v5-v4);vl[4] =lerp(pts[pz], pts[pxz], m);}
    if(bits&32)  {const m=(ISO-v5)/(v7-v5);vl[5] =lerp(pts[pxz],pts[pxyz],m);}
    if(bits&64)  {const m=(ISO-v6)/(v7-v6);vl[6] =lerp(pts[pyz],pts[pxyz],m);}
    if(bits&128) {const m=(ISO-v4)/(v6-v4);vl[7] =lerp(pts[pz], pts[pyz], m);}
    if(bits&256) {const m=(ISO-v0)/(v4-v0);vl[8] =lerp(pts[p],  pts[pz],  m);}
    if(bits&512) {const m=(ISO-v1)/(v5-v1);vl[9] =lerp(pts[px], pts[pxz], m);}
    if(bits&1024){const m=(ISO-v3)/(v7-v3);vl[10]=lerp(pts[pxy],pts[pxyz],m);}
    if(bits&2048){const m=(ISO-v2)/(v6-v2);vl[11]=lerp(pts[py], pts[pyz], m);}
    let i=0; const off=ci<<4;
    while(TT[off+i]!==-1){
      const va=vl[TT[off+i]],vb=vl[TT[off+i+1]],vc=vl[TT[off+i+2]];
      out.push(va[0],va[1],va[2],vb[0],vb[1],vb[2],vc[0],vc[1],vc[2]);
      i+=3;
    }
  }
  return new Float32Array(out);
}

// ══════════════════════════════════════════════════════════════
//  THREE.JS SCENE
// ══════════════════════════════════════════════════════════════
const view3d = document.getElementById('view3d');
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.FogExp2(0x0d1117, 0.007);

const CX = AXMAX/2, CZ = AXMAX/2;
const FLOOR_Y = AXMAX * 4 / (SIZE-1); // ~10

const camera = new THREE.PerspectiveCamera(55, 1, 0.5, 600);
camera.position.set(CX, FLOOR_Y+55, CZ+85);
camera.lookAt(CX, FLOOR_Y, CZ);   // match viewer: set orientation before OrbitControls

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
view3d.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CX, FLOOR_Y, CZ);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

const HOME_CAM = camera.position.clone();
const HOME_TGT = controls.target.clone();

// lights
const ambLight = new THREE.AmbientLight(0x334466, 1.2);
scene.add(ambLight);
const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
sunLight.position.set(40,80,40);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.left = sunLight.shadow.camera.bottom = -100;
sunLight.shadow.camera.right = sunLight.shadow.camera.top = 100;
sunLight.shadow.camera.far = 300;
scene.add(sunLight);
scene.add(new THREE.DirectionalLight(0x6688aa, 0.3)).position.set(-60,20,-60);

// mesh
const mat = new THREE.MeshLambertMaterial({ color: 0x8a9db5, side: THREE.DoubleSide });
// Inject fine stone grain + dithering to break up smooth-shading bands
mat.onBeforeCompile = shader => {
  // Pass world position to fragment shader
  shader.vertexShader = 'varying vec3 vMCWorldPos;\n' + shader.vertexShader;
  shader.vertexShader = shader.vertexShader.replace(
    '#include <project_vertex>',
    `#include <project_vertex>
    vMCWorldPos = (modelMatrix * vec4(transformed, 1.0)).xyz;`
  );
  shader.fragmentShader = 'varying vec3 vMCWorldPos;\n' + shader.fragmentShader;

  // Modulate diffuseColor with fine stone grain before lighting
  shader.fragmentShader = shader.fragmentShader.replace(
    '#include <color_fragment>',
    `#include <color_fragment>
    {
      vec3 q = fract(vMCWorldPos * vec3(0.17, 0.21, 0.19));
      q = fract(q * vec3(443.897, 397.297, 491.187));
      q += dot(q, q.yzx + 19.19);
      float grain = fract((q.x + q.y) * q.z);
      float fine  = fract(sin(dot(vMCWorldPos.xz * 3.1, vec2(12.9898, 78.233))) * 43758.5453);
      diffuseColor.rgb *= mix(0.88, 1.12, grain * 0.65 + fine * 0.35);
    }`
  );

  // Screen-space hash dither at final output to kill quantization banding
  shader.fragmentShader = shader.fragmentShader.replace(
    '#include <dithering_fragment>',
    `{
      float d = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)))*43758.5453) - 0.5;
      gl_FragColor.rgb += d * (3.0 / 255.0);
    }`
  );
};
let mesh = null;

let firstBuild = true;
function rebuildMesh() {
  const t0 = performance.now();
  if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); }
  const { pts, val } = buildField();
  const pos = marchingCubes(pts, val);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.computeVertexNormals();
  mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);

  if (firstBuild) {
    firstBuild = false;
    // Use vertex centroid (not bounding-box center) — accounts for asymmetric dungeon geometry
    const posA = geo.getAttribute('position');
    let sumX = 0, sumZ = 0;
    for (let i = 0; i < posA.count; i++) { sumX += posA.getX(i); sumZ += posA.getZ(i); }
    const cx = sumX / posA.count;
    const cz = sumZ / posA.count;
    controls.target.set(cx, FLOOR_Y, cz);
    camera.position.set(cx, FLOOR_Y + 55, cz + 85);
    camera.lookAt(cx, FLOOR_Y, cz);
    controls.update();
    HOME_CAM.copy(camera.position);
    HOME_TGT.copy(controls.target);
  }
  const ms = (performance.now() - t0).toFixed(1);
  document.getElementById('stats3d').textContent =
    `${(pos.length/9)|0} triangles · ${ms}ms`;
  const bm = document.getElementById('build-msg');
  bm.textContent = 'rebuilt ✓';
  setTimeout(() => { bm.textContent = ''; }, 1200);
}
rebuildMesh();

// resize
function onResize() {
  const w = view3d.clientWidth, h = view3d.clientHeight || 1;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
new ResizeObserver(onResize).observe(view3d);
onResize();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ══════════════════════════════════════════════════════════════
//  CANVAS 2D MAP EDITOR
// ══════════════════════════════════════════════════════════════
const canvas2d = document.getElementById('map-canvas');
const ctx2d    = canvas2d.getContext('2d');
let CELL = 15;
let selTile = 'x';
let painting = false;
let paintTile = 'x'; // tile being drawn (changes on right-click)
let rebuildTimer = null;

function scheduleRebuild() {
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildMesh, 120);
}

function setCellSize(sz) {
  CELL = sz;
  canvas2d.width  = SIZE * CELL;
  canvas2d.height = SIZE * CELL;
  drawMap();
}

function drawMap() {
  ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
  for (let col = 0; col < SIZE; col++) {
    for (let row = 0; row < SIZE; row++) {
      const tile = map[col][row];
      ctx2d.fillStyle = TILE_COLOR[tile] || '#111';
      ctx2d.fillRect(col*CELL, row*CELL, CELL-1, CELL-1);
    }
  }
}

function drawCell(col, row) {
  const tile = map[col][row];
  ctx2d.fillStyle = TILE_COLOR[tile] || '#111';
  ctx2d.fillRect(col*CELL, row*CELL, CELL-1, CELL-1);
  // redraw hover highlight if needed (minor visual glitch acceptable)
}

function cellFromEvent(e) {
  const r = canvas2d.getBoundingClientRect();
  const col = Math.floor((e.clientX - r.left) / CELL);
  const row = Math.floor((e.clientY - r.top)  / CELL);
  if (col < 0 || col >= SIZE || row < 0 || row >= SIZE) return null;
  return { col, row };
}

function paintCell(e) {
  const c = cellFromEvent(e);
  if (!c) return;
  if (map[c.col][c.row] === paintTile) return; // no change
  map[c.col][c.row] = paintTile;
  drawCell(c.col, c.row);
  scheduleRebuild();
}

canvas2d.addEventListener('mousedown', e => {
  e.preventDefault();
  painting = true;
  paintTile = e.button === 2 ? '_' : selTile;
  paintCell(e);
});
canvas2d.addEventListener('mousemove', e => {
  const c = cellFromEvent(e);
  if (c) {
    const t = TILES.find(t => t.id === map[c.col][c.row]);
    document.getElementById('hover-info').textContent =
      `[${c.col},${c.row}] ${t ? t.label : '?'}`;
  }
  if (painting) paintCell(e);
});
canvas2d.addEventListener('mouseup',    () => { painting = false; });
canvas2d.addEventListener('mouseleave', () => { painting = false; });
canvas2d.addEventListener('contextmenu', e => e.preventDefault());

// ── palette ──────────────────────────────────────────────────
const paletteEl = document.getElementById('palette');
TILES.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'tile-btn' + (t.id === selTile ? ' sel' : '');
  btn.title = t.desc;
  btn.innerHTML = `<span class="swatch" style="background:${t.color}"></span>${t.label}`;
  btn.addEventListener('click', () => {
    selTile = t.id;
    document.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
  });
  paletteEl.appendChild(btn);
});

// ── toolbar controls ─────────────────────────────────────────
document.getElementById('sl-amb').addEventListener('input', e => {
  const v = e.target.value / 10;
  ambLight.intensity = v;
  document.getElementById('v-amb').textContent = v.toFixed(1);
});
document.getElementById('sl-sun').addEventListener('input', e => {
  const v = e.target.value / 10;
  sunLight.intensity = v;
  document.getElementById('v-sun').textContent = v.toFixed(1);
});
document.getElementById('sl-pit').addEventListener('input', e => {
  PIT = parseInt(e.target.value);
  document.getElementById('v-pit').textContent = PIT;
  scheduleRebuild();
});
document.getElementById('sl-zoom').addEventListener('input', e => {
  setCellSize(parseInt(e.target.value));
});

document.getElementById('btn-wire').addEventListener('click', function() {
  mat.wireframe = !mat.wireframe;
  this.classList.toggle('active', mat.wireframe);
});
document.getElementById('btn-top').addEventListener('click', () => {
  camera.position.set(CX, FLOOR_Y + 160, CZ + 0.1);
  controls.target.set(CX, FLOOR_Y, CZ);
  controls.update();
});
document.getElementById('btn-cam').addEventListener('click', () => {
  camera.position.copy(HOME_CAM);
  controls.target.copy(HOME_TGT);
  controls.update();
});
document.getElementById('btn-export').addEventListener('click', () => {
  const rows = map.map((col, xi) =>
    `  [${col.map(t => `'${t}'`).join(',')}]`
  ).join(',\n');
  const txt = `const mjkMap = [\n${rows}\n];`;
  navigator.clipboard.writeText(txt).then(() => {
    const bm = document.getElementById('build-msg');
    bm.textContent = 'copied!';
    setTimeout(() => { bm.textContent = ''; }, 1500);
  });
});

// ── init ──────────────────────────────────────────────────────
setCellSize(15);
</script>
</body>
</html>
