<!DOCTYPE html>
<html>
<head>
  <title>mjkMarchingCubes Viewer</title>
  <style>
    body { margin: 0; background: #1a1a2e; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #ccc; font-family: monospace; font-size: 12px;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px;
      line-height: 1.6;
    }
    #info b { color: #7fb3d3; }
    #info label { font-size: 11px; color: #aaa; }
    #info input[type=range] { width: 90px; vertical-align: middle; accent-color: #58a6ff; }
    #info .row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    #info span.val { color: #58a6ff; font-size: 11px; min-width: 28px; }
  </style>
</head>
<body>
<div id="info">
  <b>mjkMarchingCubes Viewer</b><br>
  Drag: orbit &nbsp;|&nbsp; Right drag: pan &nbsp;|&nbsp; Scroll: zoom<br>
  <b>W</b>: wireframe &nbsp;|&nbsp; <b>R</b>: reset camera
  <div class="row">
    <label>Ambient</label>
    <input type="range" id="sl-ambient" min="0" max="30" value="8" step="1">
    <span class="val" id="v-ambient">0.8</span>
  </div>
  <div class="row">
    <label>Sun&nbsp;&nbsp;&nbsp;</label>
    <input type="range" id="sl-sun" min="0" max="30" value="15" step="1">
    <span class="val" id="v-sun">1.5</span>
  </div>
  <div class="row">
    <label>TexScale</label>
    <input type="range" id="sl-scale" min="2" max="50" value="36" step="1">
    <span class="val" id="v-scale">0.36</span>
  </div>
  <div class="row">
    <label>ZoneBlend</label>
    <input type="range" id="sl-blend" min="1" max="30" value="8" step="1">
    <span class="val" id="v-blend">0.8</span>
  </div>
  <div style="font-size:10px;color:#555;margin-top:5px;padding-top:4px;border-top:1px solid #333">
    mesh Y &mdash; pit:<span id="hy-pit">?</span>
    &nbsp;floor:<span id="hy-floor">?</span>
    &nbsp;top:<span id="hy-top">?</span>
  </div>
  <div class="row">
    <label>Pit→Flr</label>
    <input type="range" id="sl-ypit"  min="0" max="200" value="105" step="5">
    <span class="val" id="v-ypit">10.5</span>
  </div>
  <div class="row">
    <label>Flr→Wall</label>
    <input type="range" id="sl-ywall" min="0" max="250" value="95"  step="5">
    <span class="val" id="v-ywall">9.5</span>
  </div>
  <div class="row">
    <label>Wall cap</label>
    <input type="range" id="sl-yceil" min="0" max="250" value="165" step="5">
    <span class="val" id="v-yceil">16.5</span>
  </div>
</div>

// ============================================================
// PARAMETERS

const SIZE       = 32;
const AXIS_MIN   = 0;
const AXIS_MAX   = 78;
const AXIS_RANGE = AXIS_MAX - AXIS_MIN;
const PIT_DEPTH  = 4;
const TH         = 6;   // terrainHardness
const ISOLEVEL   = 0;
const SIZE2      = SIZE * SIZE;

// ============================================================
// BUILD SCALAR FIELD  (ported from InitChunkPerlin)
// ============================================================
function buildScalarField() {
  const points = new Array(SIZE * SIZE * SIZE);
  const values = new Float32Array(SIZE * SIZE * SIZE);

  for (let z = 0; z < SIZE; z++) {
    for (let y = 0; y < SIZE; y++) {
      for (let xi = 0; xi < SIZE; xi++) {
        const idx = xi + y * SIZE + z * SIZE2;
        points[idx] = [
          AXIS_MIN + AXIS_RANGE * xi / (SIZE - 1),
          AXIS_MIN + AXIS_RANGE * y  / (SIZE - 1),
          AXIS_MIN + AXIS_RANGE * z  / (SIZE - 1)
        ];

        const sss = mjkMap[xi][z];
        let val = -TH * 5; // default: air

        // Solid wall
        if (sss === "1" && y < 4 + PIT_DEPTH) val = TH;
        // Height steps
        if (sss === "a" && y < 2 + PIT_DEPTH) val = TH;
        if (sss === "b" && y < 3 + PIT_DEPTH) val = TH;
        if (sss === "c" && y < 4 + PIT_DEPTH) val = TH;

        // Floor (overrides defaults above)
        if (y <= PIT_DEPTH) val = TH * 50;

        // Ledge pits: A/B/C/w are hollow by default (override floor)
        if (sss === "A" || sss === "B" || sss === "C" || sss === "w") {
          val = -TH * 5;
        }
        // Ledge surfaces at specific heights
        if (sss === "w" && y === 0 + PIT_DEPTH)   val = TH * 50;
        if (sss === "A" && y === 1 + PIT_DEPTH)   val = TH;
        if (sss === "B" && y === 2 + PIT_DEPTH)   val = TH;
        if (sss === "C" && y === 3 + PIT_DEPTH)   val = TH;

        // Pits: hollow above floor
        if (sss === "o" && y <= PIT_DEPTH)         val = -TH * 50;
        // Pit bottom (solid)
        if (sss === "o" && y === 0)                val = TH * 10000;
        // Ledge bottoms (solid)
        if ((sss==="A"||sss==="B"||sss==="C"||sss==="w") && y === 0) {
          val = TH * 10000;
        }

        values[idx] = val;
      }
    }
  }
  return { points, values };
}

// ============================================================
// MARCHING CUBES ALGORITHM
// ============================================================
function marchingCubes(points, values) {
  const verts = [];
  const vlist = new Array(12);

  function lerp(p1, p2, mu) {
    return [
      p1[0] + (p2[0] - p1[0]) * mu,
      p1[1] + (p2[1] - p1[1]) * mu,
      p1[2] + (p2[2] - p1[2]) * mu
    ];
  }

  for (let z = 0; z < SIZE - 1; z++)
  for (let y = 0; y < SIZE - 1; y++)
  for (let xi = 0; xi < SIZE - 1; xi++) {
    const p    = xi + y * SIZE + z * SIZE2;
    const px   = p + 1;
    const py   = p + SIZE;
    const pxy  = py + 1;
    const pz   = p + SIZE2;
    const pxz  = px + SIZE2;
    const pyz  = py + SIZE2;
    const pxyz = pxy + SIZE2;

    const v0=values[p], v1=values[px], v2=values[py], v3=values[pxy];
    const v4=values[pz], v5=values[pxz], v6=values[pyz], v7=values[pxyz];

    let ci = 0;
    if (v0 < ISOLEVEL) ci |= 1;
    if (v1 < ISOLEVEL) ci |= 2;
    if (v2 < ISOLEVEL) ci |= 8;
    if (v3 < ISOLEVEL) ci |= 4;
    if (v4 < ISOLEVEL) ci |= 16;
    if (v5 < ISOLEVEL) ci |= 32;
    if (v6 < ISOLEVEL) ci |= 128;
    if (v7 < ISOLEVEL) ci |= 64;

    const bits = edgeTable[ci];
    if (bits === 0) continue;

    if (bits &    1) { const mu=(ISOLEVEL-v0)/(v1-v0); vlist[0] =lerp(points[p],   points[px],   mu); }
    if (bits &    2) { const mu=(ISOLEVEL-v1)/(v3-v1); vlist[1] =lerp(points[px],  points[pxy],  mu); }
    if (bits &    4) { const mu=(ISOLEVEL-v2)/(v3-v2); vlist[2] =lerp(points[py],  points[pxy],  mu); }
    if (bits &    8) { const mu=(ISOLEVEL-v0)/(v2-v0); vlist[3] =lerp(points[p],   points[py],   mu); }
    if (bits &   16) { const mu=(ISOLEVEL-v4)/(v5-v4); vlist[4] =lerp(points[pz],  points[pxz],  mu); }
    if (bits &   32) { const mu=(ISOLEVEL-v5)/(v7-v5); vlist[5] =lerp(points[pxz], points[pxyz], mu); }
    if (bits &   64) { const mu=(ISOLEVEL-v6)/(v7-v6); vlist[6] =lerp(points[pyz], points[pxyz], mu); }
    if (bits &  128) { const mu=(ISOLEVEL-v4)/(v6-v4); vlist[7] =lerp(points[pz],  points[pyz],  mu); }
    if (bits &  256) { const mu=(ISOLEVEL-v0)/(v4-v0); vlist[8] =lerp(points[p],   points[pz],   mu); }
    if (bits &  512) { const mu=(ISOLEVEL-v1)/(v5-v1); vlist[9] =lerp(points[px],  points[pxz],  mu); }
    if (bits & 1024) { const mu=(ISOLEVEL-v3)/(v7-v3); vlist[10]=lerp(points[pxy], points[pxyz], mu); }
    if (bits & 2048) { const mu=(ISOLEVEL-v2)/(v6-v2); vlist[11]=lerp(points[py],  points[pyz],  mu); }

    let i = 0;
    const off = ci << 4;
    while (triTable[off + i] !== -1) {
      const va = vlist[triTable[off + i]];
      const vb = vlist[triTable[off + i + 1]];
      const vc = vlist[triTable[off + i + 2]];
      verts.push(va[0],va[1],va[2], vb[0],vb[1],vb[2], vc[0],vc[1],vc[2]);
      i += 3;
    }
  }
  return new Float32Array(verts);
}

const CENTER_X = AXIS_MAX / 2, CENTER_Z = AXIS_MAX / 2;
const FLOOR_Y  = AXIS_MAX * PIT_DEPTH / (SIZE - 1); // ~10
camera.position.set(CENTER_X - 30, FLOOR_Y + 60, CENTER_Z + 100);

controls.enableDamping = true;

controls.update();

const vertexShader = /* glsl */`
  varying vec3 vPos;
  varying vec3 vNrm;
  void main() {
    vec4 wp     = modelMatrix * vec4(position, 1.0);
    vPos        = wp.xyz;
    vNrm        = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;

const fragmentShader = /* glsl */`
  precision highp float;
  varying vec3 vPos;
  varying vec3 vNrm;
  uniform float uAmb;
  uniform float uSun;
  uniform float uScale;
  uniform float uBlend;   // zone-blend half-width in world Y units
  uniform float uYPit;    // pit→floor transition center (world Y)
  uniform float uYWall;   // floor→wall transition center (world Y)
  uniform float uYCeil;   // wall cap transition center (world Y)

  // ── Hash / value noise ─────────────────────────────────────
  float hash(vec2 p) {
    p  = fract(p * vec2(234.34, 435.345));
    p += dot(p, p + 34.23);
    return fract(p.x * p.y);
  }
  float vnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(hash(i), hash(i + vec2(1,0)), f.x),
      mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
  }
  float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++) { v += a * vnoise(p); p *= 2.1; a *= 0.48; }
    return v;
  }

  // ── Voronoi (returns nearest-cell distance) ────────────────
  float voronoi(vec2 p) {
    vec2 ip = floor(p), fp = fract(p);
    float d = 1e9;
    for (int j = -1; j <= 1; j++)
    for (int i = -1; i <= 1; i++) {
      vec2 nb = vec2(float(i), float(j));
      vec2 pt = 0.5 + 0.5 * sin(6.2831 *
                vec2(hash(ip + nb), hash(ip + nb + vec2(17.0, 31.0))));
      d = min(d, length(nb + pt - fp));
    }
    return d;
  }

  // ── Procedural stone textures ──────────────────────────────
  // Floor: flagstone with voronoi cracks
  vec3 floorTex(vec2 uv) {
    float cell   = voronoi(uv * 1.6);
    float crack  = smoothstep(0.0, 0.07, cell);      // 0 = grout line
    float cellId = hash(floor(uv * 1.6));
    float surf   = fbm(uv * 5.5);
    vec3  stone  = mix(vec3(0.37,0.31,0.23), vec3(0.52,0.46,0.35),
                       cellId * 0.65 + surf * 0.35);
    return mix(vec3(0.18,0.17,0.15), stone, crack);
  }

  // Wall: stone block courses with mortar
  vec3 wallTex(vec2 uv) {
    float rowY   = uv.y * 4.5;
    float rowId  = floor(rowY);
    float rowF   = fract(rowY);
    float offset = fract(rowId * 0.5) * 0.55;       // alternate row offset
    float colX   = (uv.x + offset) * 2.8;
    float brkId  = floor(colX);
    float colF   = fract(colX);
    float mY = smoothstep(0.0,0.07,rowF) * (1.0 - smoothstep(0.88,0.97,rowF));
    float mX = smoothstep(0.0,0.06,colF) * (1.0 - smoothstep(0.91,0.98,colF));
    float mortar = mY * mX;
    float bVar   = hash(vec2(brkId, rowId));
    float surf   = fbm(vec2(colX, rowY) * 1.8);
    vec3  brick  = mix(vec3(0.28,0.28,0.31), vec3(0.42,0.42,0.47),
                       bVar * 0.55 + surf * 0.45);
    return mix(vec3(0.21,0.21,0.22), brick, mortar);
  }

  // Pit: dark damp stone
  vec3 pitTex(vec2 uv) {
    float n   = fbm(uv * 3.2);
    float wet = vnoise(uv * 9.0);
    vec3  col = mix(vec3(0.07,0.08,0.10), vec3(0.15,0.17,0.20), n);
    col += vec3(0.0, 0.01, 0.02) * wet;             // moisture tint
    return col;
  }

  // ── Triplanar mapping ──────────────────────────────────────
  vec3 triplanar(vec3 pos, vec3 N, float sc) {
    // Normal-weighted blend (power sharpens transition)
    vec3 w = pow(abs(N), vec3(5.0));
    w /= (w.x + w.y + w.z + 1e-5);

    // UV sets per axis
    vec2 uvX = pos.zy * sc;
    vec2 uvY = pos.xz * sc;
    vec2 uvZ = pos.xy * sc;

    // Height-zone blends (world Y; FLOOR_Y ≈ 10, wall top ≈ 20)
    // uBlend controls half-width of each transition in world-Y units.
    // Low uBlend = sharp boundaries; high = soft gradients.
    float hw       = uBlend;                                        // half-width
    float abovePit = smoothstep(uYPit  - hw, uYPit  + hw, pos.y); // pit→floor
    float inWall   = smoothstep(uYWall - hw, uYWall + hw, pos.y); // floor→wall sides
    float atCeil   = smoothstep(uYCeil - hw, uYCeil + hw, pos.y); // wall cap

    // Y projection — horizontal faces:
    //   low Y  → pit stone
    //   floor  → flagstone
    //   wall top / ceiling cap → wall stone (fix for issue 3)
    vec3 cY_above = mix(floorTex(uvY), wallTex(uvY), atCeil);
    vec3 cY       = mix(pitTex(uvY), cY_above, abovePit);

    // X/Z projections — vertical faces: pit → wall (skip floor pattern above floor)
    // Use inWall directly: floor texture only appears right at floor level on sides
    vec3 sideX = mix(floorTex(uvX), wallTex(uvX), inWall);
    vec3 cX    = mix(pitTex(uvX), sideX, abovePit);

    vec3 sideZ = mix(floorTex(uvZ), wallTex(uvZ), inWall);
    vec3 cZ    = mix(pitTex(uvZ), sideZ, abovePit);

    return cX * w.x + cY * w.y + cZ * w.z;
  }

  // ── Main ───────────────────────────────────────────────────
  void main() {
    vec3 N      = normalize(vNrm);
    vec3 albedo = triplanar(vPos, N, uScale);

    // Lighting directions
    vec3 sunDir  = normalize(vec3(1.0, 2.0, 1.0));
    vec3 fillDir = normalize(vec3(-1.0, 0.5, -1.0));

    // Diffuse
    float diff = max(dot(N, sunDir),  0.0);
    float fill = max(dot(N, fillDir), 0.0) * 0.25;

    // Wet-floor specular (Blinn-Phong, active near floor level only)
    float wet    = smoothstep(5.0, 9.5, vPos.y) *
                   (1.0 - smoothstep(9.5, 13.0, vPos.y));
    vec3  H      = normalize(sunDir + vec3(0.0, 1.0, 0.3));
    float spec   = pow(max(dot(N, H), 0.0), 48.0) * wet * 0.25;

    // Compose
    vec3 ambCol  = vec3(0.20, 0.27, 0.40);
    vec3 sunCol  = vec3(1.00, 0.93, 0.87);
    vec3 fillCol = vec3(0.10, 0.13, 0.20);

    vec3 lit = albedo * (ambCol * uAmb +
                         sunCol * uSun * diff +
                         fillCol * fill);
    lit += sunCol * spec * uSun;

    // Gamma
    lit = pow(max(lit, vec3(0.0)), vec3(1.0 / 2.2));
    gl_FragColor = vec4(lit, 1.0);
  }
`;

// ── Shader uniforms ────────────────────────────────────────────
const uniforms = {
  uAmb:   { value: 0.8 },
  uSun:   { value: 1.5 },
  uScale: { value: 0.36 },
  uBlend: { value: 0.8 },
  uYPit:  { value: 10.5 },
  uYWall: { value: 9.5 },
  uYCeil: { value: 16.5 },
};

// ── Build mesh ─────────────────────────────────────────────────
const { points, values } = buildScalarField();
const posArray = marchingCubes(points, values);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geo.computeVertexNormals();

// ── Compute mesh Y extents for hint display ─────────────────────
{
  const posA = geo.getAttribute('position');
  const nrmA = geo.getAttribute('normal');
  let minY = Infinity, maxY = -Infinity;
  const upY = [];
  for (let i = 0; i < posA.count; i++) {
    const y = posA.getY(i);
    if (y < minY) minY = y;
    if (y > maxY) maxY = y;
    if (nrmA.getY(i) > 0.7) upY.push(y);
  }
  // Mode Y of upward-facing vertices = main floor level
  const bins = {};
  for (const y of upY) { const k = Math.round(y * 2) / 2; bins[k] = (bins[k]||0) + 1; }
  let bestK = 0, bestN = 0;
  for (const [k, n] of Object.entries(bins)) { if (n > bestN) { bestN = n; bestK = +k; } }
  document.getElementById('hy-pit').textContent   = minY.toFixed(1);
  document.getElementById('hy-floor').textContent = bestK.toFixed(1);
  document.getElementById('hy-top').textContent   = maxY.toFixed(1);
}

const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader,
  fragmentShader,
  side: THREE.DoubleSide,
});
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

console.log(`Triangles: ${posArray.length / 9}`);

// ── Controls ───────────────────────────────────────────────────
const HOME_POS    = camera.position.clone();
const HOME_TARGET = controls.target.clone();

window.addEventListener('keydown', e => {
  if (e.key === 'w' || e.key === 'W') mat.wireframe = !mat.wireframe;
  if (e.key === 'r' || e.key === 'R') {
    camera.position.copy(HOME_POS);
    controls.target.copy(HOME_TARGET);
    controls.update();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('sl-ambient').addEventListener('input', e => {
  uniforms.uAmb.value = e.target.value / 10;
  document.getElementById('v-ambient').textContent = uniforms.uAmb.value.toFixed(1);
});
document.getElementById('sl-sun').addEventListener('input', e => {
  uniforms.uSun.value = e.target.value / 10;
  document.getElementById('v-sun').textContent = uniforms.uSun.value.toFixed(1);
});
document.getElementById('sl-scale').addEventListener('input', e => {
  uniforms.uScale.value = e.target.value / 100;
  document.getElementById('v-scale').textContent = uniforms.uScale.value.toFixed(2);
});
document.getElementById('sl-blend').addEventListener('input', e => {
  uniforms.uBlend.value = e.target.value / 10;
  document.getElementById('v-blend').textContent = uniforms.uBlend.value.toFixed(1);
});
document.getElementById('sl-ypit').addEventListener('input', e => {
  uniforms.uYPit.value = e.target.value / 10;
  document.getElementById('v-ypit').textContent = uniforms.uYPit.value.toFixed(1);
});
document.getElementById('sl-ywall').addEventListener('input', e => {
  uniforms.uYWall.value = e.target.value / 10;
  document.getElementById('v-ywall').textContent = uniforms.uYWall.value.toFixed(1);
});
document.getElementById('sl-yceil').addEventListener('input', e => {
  uniforms.uYCeil.value = e.target.value / 10;
  document.getElementById('v-yceil').textContent = uniforms.uYCeil.value.toFixed(1);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
